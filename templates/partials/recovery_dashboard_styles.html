<style>
  :root {
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
  }
  [data-theme="dark"] {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --border: #334155;
  }
  body { font-family: "IBM Plex Sans Arabic", system-ui, sans-serif; }
  body {
    background: var(--bg) !important;
    color: var(--text) !important;
  }
  .cf-dash-card,
  .rs-card {
    background: var(--card);
    border-color: var(--border);
  }
  .cf-dash-section-head h2,
  .rs-section-title {
    color: var(--text);
  }
  .cf-dash-compact input:not([type="radio"]):not([type="checkbox"]):not([type="color"]):not([type="hidden"]),
  .cf-dash-compact select,
  .cf-dash-compact textarea,
  .rs-select {
    background: var(--card) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }
  .cf-dash-compact ::placeholder {
    color: var(--muted);
  }
  .cf-switch-row {
    border-color: var(--border);
  }
  [data-theme="dark"] .cf-dash-save-wrap {
    background: linear-gradient(180deg, rgba(15, 23, 42, 0) 0%, rgba(15, 23, 42, 0.95) 35%);
  }
  .rs-card {
    border-radius: 0.75rem;
    border: 1px solid #e9e7ef;
    background: #fff;
    padding: 1rem;
    box-shadow: 0 1px 2px rgb(24 24 27 / 0.04);
  }
  .rs-section-title {
    font-weight: 700;
    font-size: 0.9375rem;
    color: #1e1b4b;
    padding-bottom: 0.375rem;
    margin-bottom: 0.375rem;
    border-bottom: 2px solid rgb(124 58 237 / 0.35);
  }
  .rs-select {
    transition: background-color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .rs-select:hover {
    background-color: rgb(245 243 255 / 0.95);
    border-color: rgb(196 181 253 / 0.9);
  }
  /* Deep-link flash from الرئيسية → رسائل استعادة السلة */
  .cf-msg-deep-highlight {
    outline: 2px solid rgb(124 58 237 / 0.88);
    outline-offset: 3px;
    box-shadow:
      0 0 0 4px rgb(124 58 237 / 0.18),
      0 6px 20px -8px rgb(124 58 237 / 0.35);
    transition:
      outline 0.2s ease,
      box-shadow 0.2s ease;
  }
  @media (max-width: 767px) {
    .rs-card {
      padding: 1.25rem 1rem;
    }
    .rs-section-title {
      font-size: 1.0625rem;
      line-height: 1.45;
    }
    #f input:not([type="radio"]):not([type="checkbox"]),
    #f select {
      min-height: 48px;
      font-size: 1rem;
      line-height: 1.45;
    }
    #f textarea {
      min-height: 7rem;
      font-size: 1rem;
      line-height: 1.55;
    }
    /* لوحات CartFlow المدمجة: حقول أصغر قليلاً */
    #f.cf-dash-compact input:not([type="radio"]):not([type="checkbox"]):not([type="color"]):not([type="hidden"]),
    #f.cf-dash-compact select {
      min-height: 44px;
      font-size: 0.9375rem;
    }
    #f.cf-dash-compact textarea {
      min-height: 5.5rem;
      font-size: 0.9375rem;
    }
  }

  /* تمييز إجراء مطابق للاقتراح الذكي (قراءة فقط — لا يُرسل تلقائياً) */
  .cf-smart-action-ring {
    outline: 2px solid rgba(124, 58, 237, 0.38);
    outline-offset: 3px;
    border-radius: 0.375rem;
    transition: outline-color 0.15s ease;
  }

  /* —— نظام CartFlow الموحد (بطاقات / تمييز / مفاتيح) —— */
  .cf-dash-shell {
    max-width: 28rem;
    margin-left: auto;
    margin-right: auto;
    width: 100%;
    box-sizing: border-box;
  }
  .cf-dash-hero {
    border-radius: 1rem;
    background: linear-gradient(135deg, #14532d 0%, #166534 48%, #15803d 100%);
    color: #fff;
    padding: 1rem 1.1rem 1.1rem;
    margin-bottom: 0.75rem;
    box-shadow: 0 10px 28px -12px rgba(21, 128, 61, 0.45);
  }
  .cf-dash-hero h1 {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.35;
    letter-spacing: -0.02em;
  }
  .cf-dash-hero p {
    margin-top: 0.35rem;
    font-size: 0.8125rem;
    line-height: 1.45;
    opacity: 0.92;
  }
  .cf-dash-card {
    border-radius: 1.125rem;
    border: 1px solid rgb(226 232 240 / 0.95);
    background: #fff;
    padding: 0.75rem 0.85rem;
    box-shadow: 0 1px 2px rgb(15 23 42 / 0.04);
    box-sizing: border-box;
    max-width: 100%;
  }
  .cf-dash-card + .cf-dash-card {
    margin-top: 0.55rem;
  }
  .cf-dash-section-head {
    display: flex;
    align-items: baseline;
    gap: 0.35rem;
    margin-bottom: 0.45rem;
    padding-bottom: 0.35rem;
    border-bottom: 2px solid rgb(124 58 237 / 0.32);
  }
  .cf-dash-section-head h2 {
    font-size: 0.9375rem;
    font-weight: 700;
    color: #1e1b4b;
    margin: 0;
  }
  .cf-dash-save-wrap {
    position: sticky;
    bottom: 0;
    z-index: 25;
    margin-top: 0.75rem;
    padding: 0.5rem 0 0.75rem;
    background: linear-gradient(180deg, rgba(248, 250, 252, 0) 0%, rgb(248 250 252) 35%);
  }
  .cf-dash-save {
    display: inline-flex;
    width: 100%;
    min-height: 48px;
    align-items: center;
    justify-content: center;
    border-radius: 0.875rem;
    border: 1px solid rgba(22, 101, 52, 0.2);
    background: #15803d;
    color: #fff;
    font-weight: 700;
    font-size: 0.9375rem;
    box-shadow: 0 2px 8px -2px rgba(22, 101, 52, 0.35);
    transition: background 0.15s ease;
  }
  .cf-dash-save:hover {
    background: #166534;
  }
  .cf-dash-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 2.5rem;
    padding: 0.35rem 0.65rem;
    border-radius: 999px;
    border: 1px solid rgb(203 213 225);
    background: #fff;
    font-size: 0.8125rem;
    font-weight: 700;
    color: #475569;
    cursor: pointer;
    transition: border-color 0.12s ease, background 0.12s ease, color 0.12s ease;
  }
  .cf-dash-pill:has(input:checked) {
    border-color: rgba(22, 163, 74, 0.75);
    background: rgba(220, 252, 231, 0.9);
    color: #14532d;
  }
  .cf-dash-pill input {
    position: absolute;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
  }
  .cf-tone-card {
    border-radius: 0.75rem;
    border: 1px solid rgb(226 232 240);
    background: #fff;
    padding: 0.55rem 0.6rem;
    text-align: right;
    cursor: pointer;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .cf-tone-card--on {
    border-color: rgba(22, 163, 74, 0.75);
    box-shadow: 0 0 0 1px rgba(22, 163, 74, 0.2);
  }
  .cf-tone-choice:has(input:checked) {
    border-color: rgba(22, 163, 74, 0.75);
    box-shadow: 0 0 0 1px rgba(22, 163, 74, 0.2);
  }
  .cf-msg-bubble {
    display: block;
    width: 100%;
    text-align: right;
    border-radius: 0.75rem;
    border: 1px solid rgb(226 232 240);
    background: rgb(248 250 252);
    padding: 0.5rem 0.65rem;
    font-size: 0.8125rem;
    line-height: 1.45;
    color: #334155;
    cursor: pointer;
    transition: border-color 0.12s ease, background 0.12s ease;
  }
  .cf-msg-bubble--on {
    border-color: rgba(22, 163, 74, 0.75);
    background: rgba(220, 252, 231, 0.45);
  }
  .cf-pos-btn {
    border-radius: 0.65rem;
    border: 1px solid rgb(226 232 240);
    padding: 0.45rem 0.35rem;
    font-size: 0.75rem;
    font-weight: 600;
    color: #64748b;
    background: #fff;
    cursor: pointer;
    transition: border-color 0.12s ease, color 0.12s ease;
  }
  .cf-pos-btn--on {
    border-color: rgba(22, 163, 74, 0.8);
    color: #166534;
  }
  .cf-color-dot {
    width: 2rem;
    height: 2rem;
    border-radius: 999px;
    border: 2px solid transparent;
    padding: 0;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .cf-color-dot--on {
    box-shadow: 0 0 0 2px #fff, 0 0 0 4px currentColor;
    transform: scale(1.06);
  }
  .cf-switch-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    padding: 0.45rem 0;
    border-bottom: 1px solid rgb(241 245 249);
  }
  .cf-switch-row:last-child {
    border-bottom: 0;
  }
  .cf-switch {
    width: 2.75rem;
    height: 1.5rem;
    border-radius: 999px;
    border: none;
    background: rgb(226 232 240);
    position: relative;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s ease;
  }
  .cf-switch[aria-checked="true"] {
    background: #22c55e;
  }
  .cf-switch::after {
    content: "";
    position: absolute;
    top: 2px;
    width: 1.15rem;
    height: 1.15rem;
    border-radius: 999px;
    background: #fff;
    box-shadow: 0 1px 2px rgb(0 0 0 / 0.12);
    transition: transform 0.15s ease;
    right: 2px;
  }
  .cf-switch[aria-checked="false"]::after {
    transform: translateX(-1.2rem);
  }
</style>
