<aside class="w-56 shrink-0 border-l border-zid-100 bg-white shadow-sm">
  <div class="flex h-14 items-center border-b border-zid-100 px-4">
    <span class="text-lg font-bold text-zid-600">CartFlow</span>
  </div>
  <nav class="space-y-1 p-3 text-sm" aria-label="لوحة التحكم">
    <a
      href="/dashboard"
      data-dash-nav="dashboard"
      class="group flex items-center gap-2 rounded-lg px-3 py-2.5 text-slate-600 transition-colors hover:bg-zid-50 hover:shadow-sm"
    >
      <span class="inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-slate-100 text-[15px] shadow-inner transition-colors group-hover:bg-white group-hover:text-zid-700" aria-hidden="true">🏠</span>
      <span class="min-w-0 leading-snug">لوحة التحكم</span>
    </a>
    <div class="px-3 pb-1 pt-3 text-[11px] font-bold tracking-wide text-zid-600">
      CartFlow ⚡
    </div>
    <a
      href="/dashboard/recovery-settings"
      data-dash-nav="recovery"
      class="group flex items-center gap-2 rounded-lg px-3 py-2.5 text-slate-600 transition-colors hover:bg-zid-50 hover:shadow-sm"
    >
      <span class="inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-slate-100 text-[15px] shadow-inner transition-colors group-hover:bg-white group-hover:text-zid-700" aria-hidden="true">⚙️</span>
      <span class="min-w-0 leading-snug">إعدادات الاسترجاع</span>
    </a>
    <a
      href="/dashboard/recovery-settings#templates"
      data-dash-nav="templates"
      class="group mr-2 flex items-center gap-2 rounded-lg px-3 py-2 text-xs text-slate-600 transition-colors hover:bg-zid-50 hover:shadow-sm"
    >
      <span class="inline-flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-slate-100 text-[13px] shadow-inner transition-colors group-hover:bg-white group-hover:text-zid-700" aria-hidden="true">💬</span>
      <span class="min-w-0 leading-snug">نمط الرسائل</span>
    </a>
  </nav>
</aside>
<script>
  (function () {
    function applyDashboardNavActive() {
      var path = window.location.pathname || "";
      var hash = (window.location.hash || "").replace(/^#/, "").toLowerCase();
      var dashEl = document.querySelector('[data-dash-nav="dashboard"]');
      var recEl = document.querySelector('[data-dash-nav="recovery"]');
      var tplEl = document.querySelector('[data-dash-nav="templates"]');
      var mainIdle =
        "group flex items-center gap-2 rounded-lg px-3 py-2.5 text-slate-600 transition-colors hover:bg-zid-50 hover:shadow-sm";
      var mainOn =
        "group flex items-center gap-2 rounded-lg border border-zid-300/70 border-l-4 border-l-zid-600 bg-zid-100 px-3 py-2.5 font-semibold text-zid-950 shadow-sm ring-1 ring-zid-400/30 transition-colors";
      var subIdle =
        "group mr-2 flex items-center gap-2 rounded-lg px-3 py-2 text-xs text-slate-600 transition-colors hover:bg-zid-50 hover:shadow-sm";
      var subOn =
        "group mr-2 flex items-center gap-2 rounded-lg border border-zid-300/70 border-l-4 border-l-zid-600 bg-zid-100 px-3 py-2 text-xs font-semibold text-zid-950 shadow-sm ring-1 ring-zid-400/30 transition-colors";

      var isDash = /^\/dashboard\/?$/.test(path);
      var isRecovery = path.indexOf("/dashboard/recovery-settings") === 0;
      var isTemplates = isRecovery && hash === "templates";

      if (dashEl) dashEl.className = isDash ? mainOn : mainIdle;
      if (recEl) recEl.className = !isTemplates && isRecovery ? mainOn : mainIdle;
      if (tplEl) tplEl.className = isTemplates ? subOn : subIdle;
    }

    applyDashboardNavActive();
    window.addEventListener("hashchange", applyDashboardNavActive);
  })();
</script>
