<style>
  #dash-sidebar-panel {
    background: var(--card);
    border-color: var(--border);
  }
  #dash-nav-toggle,
  #dash-theme-toggle-top {
    background: var(--card);
    border-color: var(--border);
    color: var(--text);
  }
  #dash-nav-close {
    color: var(--muted);
  }
  #dash-sidebar-panel nav a {
    color: var(--muted);
  }
  [data-theme="dark"] #dash-sidebar-panel nav a:hover {
    background: rgba(148, 163, 184, 0.14);
  }
</style>
<div
  id="dash-nav-overlay"
  class="pointer-events-none fixed inset-0 z-30 bg-slate-900/35 opacity-0 transition-opacity duration-200 md:hidden"
  aria-hidden="true"
></div>

<button
  type="button"
  id="dash-nav-toggle"
  class="fixed top-3 z-50 flex h-12 min-h-[48px] w-12 items-center justify-center rounded-xl border border-zid-200 bg-white text-xl leading-none text-zid-800 shadow-md md:hidden end-4"
  aria-expanded="false"
  aria-controls="dash-sidebar-panel"
  aria-label="فتح القائمة"
>
  ☰
</button>
<button
  type="button"
  id="dash-theme-toggle-top"
  class="fixed top-3 z-50 flex h-12 min-h-[48px] min-w-[48px] items-center justify-center gap-1 rounded-xl border border-zid-200 bg-white px-2 text-[11px] font-semibold leading-none text-slate-700 shadow-md md:hidden end-20"
  aria-label="الوضع الداكن"
  aria-checked="false"
  role="switch"
>
  <span aria-hidden="true">🌙</span>
</button>

<aside
  id="dash-sidebar-panel"
  class="fixed inset-y-0 right-0 z-40 flex h-full w-[min(17rem,calc(100vw-2rem))] max-w-[280px] translate-x-full flex-col border-l border-zid-100 bg-white shadow-xl transition-transform duration-200 ease-out md:relative md:inset-auto md:z-0 md:h-auto md:min-h-screen md:max-w-none md:w-56 md:translate-x-0 md:shadow-sm"
>
  <div class="flex h-14 shrink-0 items-center justify-between gap-2 border-b border-zid-100 px-4">
    <span class="text-lg font-bold text-zid-600">CartFlow</span>
    <button
      type="button"
      id="dash-nav-close"
      class="flex h-11 min-h-[44px] w-11 items-center justify-center rounded-lg text-lg text-slate-600 hover:bg-zid-50 md:hidden"
      aria-label="إغلاق القائمة"
    >
      ✕
    </button>
  </div>
  <nav class="grow space-y-1 overflow-y-auto p-3 text-sm" aria-label="لوحة التحكم">
    <a
      href="/dashboard"
      data-dash-nav="dashboard"
      class="group flex items-center gap-2 rounded-lg px-3 py-2.5 text-slate-600 transition-colors hover:bg-zid-50 hover:shadow-sm"
    >
      <span class="inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-slate-100 text-[15px] shadow-inner transition-colors group-hover:bg-white group-hover:text-zid-700" aria-hidden="true">🏠</span>
      <span class="min-w-0 leading-snug">لوحة التحكم</span>
    </a>
    <a
      href="/dashboard/recovery-settings"
      data-dash-nav="cartflow-recovery"
      class="group flex items-center gap-2 rounded-lg px-3 py-2.5 text-slate-600 transition-colors hover:bg-zid-50 hover:shadow-sm"
    >
      <span class="inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-slate-100 text-[15px] shadow-inner transition-colors group-hover:bg-white group-hover:text-zid-700" aria-hidden="true">⚙️</span>
      <span class="min-w-0 leading-snug">إعدادات الاسترجاع</span>
    </a>
    <a
      href="/dashboard/exit-intent-settings"
      data-dash-nav="exit-intent"
      class="group flex items-center gap-2 rounded-lg px-3 py-2.5 text-slate-600 transition-colors hover:bg-zid-50 hover:shadow-sm"
    >
      <span class="inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-slate-100 text-[15px] shadow-inner transition-colors group-hover:bg-white group-hover:text-zid-700" aria-hidden="true">💬</span>
      <span class="min-w-0 leading-snug">إعدادات رسالة قبل الخروج</span>
    </a>
    <a
      href="/dashboard/cart-recovery-messages"
      data-dash-nav="cart-recovery-msgs"
      class="group flex items-center gap-2 rounded-lg px-3 py-2.5 text-slate-600 transition-colors hover:bg-zid-50 hover:shadow-sm"
    >
      <span class="inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-slate-100 text-[15px] shadow-inner transition-colors group-hover:bg-white group-hover:text-zid-700" aria-hidden="true">🧩</span>
      <span class="min-w-0 leading-snug">إعدادات استعادة السلة</span>
    </a>
    <a
      href="/dashboard/widget-customization"
      data-dash-nav="widget-customization"
      class="group flex items-center gap-2 rounded-lg px-3 py-2.5 text-slate-600 transition-colors hover:bg-zid-50 hover:shadow-sm"
    >
      <span class="inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-slate-100 text-[15px] shadow-inner transition-colors group-hover:bg-white group-hover:text-zid-700" aria-hidden="true">🎨</span>
      <span class="min-w-0 leading-snug">تخصيص الودجيت</span>
    </a>
  </nav>
  <div class="shrink-0 border-t border-zid-100 p-3 space-y-2">
    <button
      type="button"
      id="dash-theme-toggle-side"
      class="flex w-full items-center justify-between gap-2 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-semibold text-slate-700 transition-colors hover:bg-slate-100"
      aria-label="الوضع الداكن"
      aria-checked="false"
      role="switch"
    >
      <span>الوضع الداكن</span>
      <span id="dash-theme-toggle-side-icon" aria-hidden="true">🌙</span>
    </button>
    <!-- TODO: if /logout route changes, update this href only (no backend changes). -->
    <a
      href="/logout"
      class="group flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-semibold text-red-600 transition-colors hover:bg-red-50"
    >
      <span class="inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-red-50 text-[15px]" aria-hidden="true">↪</span>
      <span class="min-w-0 leading-snug">تسجيل الخروج</span>
    </a>
  </div>
</aside>
<script>
  (function () {
    var KEY = "cf_theme";
    function normTheme(v) {
      return v === "dark" ? "dark" : "light";
    }
    function getTheme() {
      try {
        return normTheme(localStorage.getItem(KEY));
      } catch (e) {
        return "light";
      }
    }
    function setTheme(theme) {
      var t = normTheme(theme);
      document.documentElement.setAttribute("data-theme", t);
      try {
        localStorage.setItem(KEY, t);
      } catch (e) {
        /* ignore */
      }
      var top = document.getElementById("dash-theme-toggle-top");
      var side = document.getElementById("dash-theme-toggle-side");
      var sideIcon = document.getElementById("dash-theme-toggle-side-icon");
      var dark = t === "dark";
      if (top) {
        top.setAttribute("aria-checked", dark ? "true" : "false");
        top.innerHTML = dark
          ? '<span aria-hidden="true">☀️</span>'
          : '<span aria-hidden="true">🌙</span>';
      }
      if (side) side.setAttribute("aria-checked", dark ? "true" : "false");
      if (sideIcon) sideIcon.textContent = dark ? "☀️" : "🌙";
    }
    function toggleTheme() {
      setTheme(getTheme() === "dark" ? "light" : "dark");
    }
    setTheme(getTheme());
    var topBtn = document.getElementById("dash-theme-toggle-top");
    var sideBtn = document.getElementById("dash-theme-toggle-side");
    if (topBtn) topBtn.addEventListener("click", toggleTheme);
    if (sideBtn) sideBtn.addEventListener("click", toggleTheme);
    window.addEventListener("storage", function (e) {
      if (e && e.key === KEY) setTheme(getTheme());
    });

    function applyDashboardNavActive() {
      var path = window.location.pathname || "";
      var dashEl = document.querySelector('[data-dash-nav="dashboard"]');
      var recEl = document.querySelector('[data-dash-nav="cartflow-recovery"]');
      var exitEl = document.querySelector('[data-dash-nav="exit-intent"]');
      var recMsgEl = document.querySelector('[data-dash-nav="cart-recovery-msgs"]');
      var widgetEl = document.querySelector('[data-dash-nav="widget-customization"]');
      var mainIdle =
        "group flex items-center gap-2 rounded-lg px-3 py-2.5 text-slate-600 transition-colors hover:bg-zid-50 hover:shadow-sm";
      var mainOn =
        "group flex items-center gap-2 rounded-lg border border-zid-300/70 border-l-4 border-l-zid-600 bg-zid-100 px-3 py-2.5 font-semibold text-zid-950 shadow-sm ring-1 ring-zid-400/30 transition-colors";

      var isDash = /^\/dashboard\/?$/.test(path);
      var isRecovery = path.indexOf("/dashboard/recovery-settings") === 0;
      var isExitIntent = path.indexOf("/dashboard/exit-intent-settings") === 0;
      var isCartRecovery = path.indexOf("/dashboard/cart-recovery-messages") === 0;
      var isWidget = path.indexOf("/dashboard/widget-customization") === 0;

      if (dashEl) dashEl.className = isDash ? mainOn : mainIdle;
      if (recEl) recEl.className = isRecovery ? mainOn : mainIdle;
      if (exitEl) exitEl.className = isExitIntent ? mainOn : mainIdle;
      if (recMsgEl) recMsgEl.className = isCartRecovery ? mainOn : mainIdle;
      if (widgetEl) widgetEl.className = isWidget ? mainOn : mainIdle;
    }

    applyDashboardNavActive();
  })();
</script>
<script>
  (function () {
    var overlay = document.getElementById("dash-nav-overlay");
    var toggle = document.getElementById("dash-nav-toggle");
    var closeBtn = document.getElementById("dash-nav-close");
    var panel = document.getElementById("dash-sidebar-panel");

    function isDesktop() {
      return window.matchMedia("(min-width: 768px)").matches;
    }

    function setMobileNavOpen(open) {
      if (!panel || !overlay || !toggle) return;
      if (isDesktop()) {
        overlay.classList.add("pointer-events-none", "opacity-0");
        overlay.classList.remove("opacity-100");
        overlay.setAttribute("aria-hidden", "true");
        toggle.setAttribute("aria-expanded", "false");
        return;
      }
      if (open) {
        panel.classList.remove("translate-x-full");
        panel.classList.add("translate-x-0");
        overlay.classList.remove("pointer-events-none", "opacity-0");
        overlay.classList.add("opacity-100");
        overlay.setAttribute("aria-hidden", "false");
        toggle.setAttribute("aria-expanded", "true");
      } else {
        panel.classList.add("translate-x-full");
        panel.classList.remove("translate-x-0");
        overlay.classList.add("pointer-events-none", "opacity-0");
        overlay.classList.remove("opacity-100");
        overlay.setAttribute("aria-hidden", "true");
        toggle.setAttribute("aria-expanded", "false");
      }
    }

    function closeMobileNav() {
      setMobileNavOpen(false);
    }

    function openMobileNav() {
      setMobileNavOpen(true);
    }

    if (toggle) {
      toggle.addEventListener("click", function () {
        var expanded = toggle.getAttribute("aria-expanded") === "true";
        setMobileNavOpen(!expanded);
      });
    }
    if (closeBtn) closeBtn.addEventListener("click", closeMobileNav);
    if (overlay) overlay.addEventListener("click", closeMobileNav);

    window.addEventListener("keydown", function (e) {
      if (e.key === "Escape") closeMobileNav();
    });

    window.addEventListener(
      "resize",
      function () {
        if (isDesktop()) {
          overlay.classList.add("pointer-events-none", "opacity-0");
          overlay.classList.remove("opacity-100");
          overlay.setAttribute("aria-hidden", "true");
          if (toggle) toggle.setAttribute("aria-expanded", "false");
        } else {
          panel.classList.add("translate-x-full");
          panel.classList.remove("translate-x-0");
        }
      },
      { passive: true }
    );

    if (panel) {
      panel.querySelectorAll("a").forEach(function (link) {
        link.addEventListener("click", function () {
          if (!isDesktop()) closeMobileNav();
        });
      });
    }
  })();
</script>
