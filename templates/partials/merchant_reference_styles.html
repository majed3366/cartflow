<style>
  :root {
    --green:       #166534;
    --green-mid:   #16a34a;
    --green-soft:  #dcfce7;
    --green-hover: #14532d;
    --amber:       #d97706;
    --amber-soft:  #fef3c7;
    --red:         #dc2626;
    --red-soft:    #fee2e2;
    --blue:        #1d4ed8;
    --blue-soft:   #dbeafe;
    --bg:          #f8fafc;
    --surface:     #ffffff;
    --border:      #e2e8f0;
    --text:        #0f172a;
    --muted:       #64748b;
    --light:       #cbd5e1;
    --shadow:      0 1px 4px rgba(0,0,0,0.06);
    --shadow-md:   0 4px 16px rgba(0,0,0,0.08);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: "IBM Plex Sans Arabic", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    min-height: 100vh;
  }

  .sidebar {
    position: fixed; right: 0; top: 0;
    width: 224px; height: 100vh;
    background: var(--green);
    display: flex; flex-direction: column;
    z-index: 200;
  }

  .brand {
    padding: 24px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .brand-name { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
  .brand-sub  { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 3px; }

  .store-info {
    margin: 14px 16px;
    background: rgba(255,255,255,0.09);
    border-radius: 10px;
    padding: 10px 13px;
    display: flex; align-items: center; gap: 9px;
  }
  .store-led { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; flex-shrink: 0; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .store-name { font-size: 12.5px; color: rgba(255,255,255,0.9); font-weight: 600; }

  nav { padding: 8px 12px; flex: 1; overflow-y: auto; }

  .nav-section {
    font-size: 9px; font-weight: 700;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase; letter-spacing: 1px;
    padding: 14px 8px 5px;
  }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 9px;
    color: rgba(255,255,255,0.65);
    font-size: 13px; cursor: pointer;
    margin-bottom: 2px;
    transition: all .13s;
    text-decoration: none;
  }
  .nav-item:hover  { background: rgba(255,255,255,0.09); color: #fff; }
  .nav-item.active { background: rgba(255,255,255,0.16); color: #fff; font-weight: 600; }
  .nav-ico { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }

  .nav-badge {
    margin-right: auto;
    font-size: 9px; font-weight: 700;
    padding: 2px 7px; border-radius: 20px;
  }
  .nb-red    { background: #ef4444; color: #fff; }
  .nb-amber  { background: #f59e0b; color: #fff; }

  .sidebar-footer {
    padding: 14px 16px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .sf-plan {
    font-size: 10px; color: rgba(255,255,255,0.4);
    display: flex; align-items: center; gap: 6px;
  }

  .main { margin-right: 224px; display: flex; flex-direction: column; min-height: 100vh; }

  .topbar {
    height: 60px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 28px;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: var(--shadow);
  }

  .topbar-title { font-size: 16px; font-weight: 700; }
  .topbar-date  { font-size: 12px; color: var(--muted); }

  .topbar-actions { display: flex; align-items: center; gap: 10px; }

  .wa-status {
    display: flex; align-items: center; gap: 6px;
    background: var(--green-soft);
    border: 1px solid #86efac;
    padding: 5px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 600; color: var(--green);
  }
  .wa-status-muted {
    background: #f1f5f9;
    border-color: #e2e8f0;
    color: var(--muted);
  }
  .wa-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green-mid); }
  .wa-dot-muted { background: var(--light); }

  .content { padding: 24px 28px; }

  .vip-alert {
    display: flex; align-items: center; gap: 14px;
    background: linear-gradient(135deg, #fffbeb, #fefce8);
    border: 1.5px solid #fbbf24;
    border-radius: 12px;
    padding: 14px 20px;
    margin-bottom: 24px;
    animation: glow-border 3s infinite;
  }
  @keyframes glow-border {
    0%,100% { box-shadow: none; }
    50% { box-shadow: 0 0 0 3px rgba(251,191,36,.18); }
  }
  .va-icon { font-size: 22px; }
  .va-body { flex: 1; }
  .va-title { font-size: 13px; font-weight: 700; color: #78350f; }
  .va-sub   { font-size: 11px; color: #92400e; margin-top: 3px; }
  .va-btn {
    background: var(--amber); color: #fff;
    border: none; padding: 8px 18px;
    border-radius: 8px; font-size: 12px;
    font-weight: 600; cursor: pointer;
    font-family: inherit; white-space: nowrap;
    transition: background .12s;
    text-decoration: none;
    display: inline-block;
    text-align: center;
  }
  .va-btn:hover { background: #b45309; }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px; margin-bottom: 24px;
  }

  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 13px;
    padding: 20px 20px 16px;
    box-shadow: var(--shadow);
    position: relative; overflow: hidden;
    animation: rise .4s ease both;
  }
  @keyframes rise { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .kpi:nth-child(1){animation-delay:.04s}
  .kpi:nth-child(2){animation-delay:.09s}
  .kpi:nth-child(3){animation-delay:.14s}
  .kpi:nth-child(4){animation-delay:.19s}

  .kpi-accent {
    position: absolute; top: 0; right: 0;
    width: 4px; height: 100%;
    border-radius: 0 13px 13px 0;
  }

  .kpi-icon {
    font-size: 20px; margin-bottom: 10px;
    display: block;
  }
  .kpi-label { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 6px; }
  .kpi-value { font-size: 30px; font-weight: 700; line-height: 1; margin-bottom: 8px; }
  .kpi-trend { font-size: 11px; font-weight: 600; }
  .trend-up      { color: var(--green-mid); }
  .trend-neutral { color: var(--muted); }

  .body-grid {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 20px; margin-bottom: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 13px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .card-head {
    padding: 15px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-title { font-size: 13px; font-weight: 700; }
  .card-action {
    font-size: 11px; color: var(--green-mid);
    cursor: pointer; font-weight: 500;
    transition: color .12s;
    text-decoration: none;
  }
  .card-action:hover { color: var(--green); }

  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--bg); }
  th {
    padding: 10px 16px; text-align: right;
    font-size: 10px; font-weight: 600;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: .5px;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; transition: background .1s; }

  .cart-amount { font-size: 14px; font-weight: 700; }
  .cart-time   { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .cart-phone  { font-size: 11px; }
  .has-phone   { color: var(--green-mid); font-weight: 600; }
  .no-phone    { color: var(--muted); }

  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
  }
  .c-price    { background: #dbeafe; color: #1d4ed8; }
  .c-shipping { background: #ede9fe; color: #7c3aed; }
  .c-thinking { background: #fce7f3; color: #be185d; }
  .c-trust    { background: #ffedd5; color: #c2410c; }
  .c-other    { background: #f1f5f9; color: #475569; }

  .status {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
  }
  .s-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .s-recovered { background: var(--green-soft);  color: var(--green); }
  .s-recovered .s-dot { background: var(--green-mid); }
  .s-sent      { background: var(--blue-soft);   color: var(--blue); }
  .s-sent      .s-dot { background: #3b82f6; }
  .s-waiting   { background: var(--amber-soft);  color: var(--amber); }
  .s-waiting   .s-dot { background: #f59e0b; }
  .s-attention { background: var(--red-soft);    color: var(--red); }
  .s-attention .s-dot { background: var(--red); }
  .s-inactive  { background: #f1f5f9;            color: var(--muted); }
  .s-inactive  .s-dot { background: var(--light); }

  .next-action { font-size: 11px; color: var(--muted); }
  .next-action.urgent { color: var(--red); font-weight: 600; }

  .reasons-body { padding: 16px 20px; }
  .r-row { margin-bottom: 15px; }
  .r-row:last-child { margin-bottom: 0; }
  .r-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .r-label { font-size: 12px; font-weight: 500; }
  .r-count { font-size: 11px; color: var(--muted); font-weight: 600; }
  .r-track { height: 6px; background: var(--border); border-radius: 10px; overflow: hidden; }
  .r-fill  { height: 100%; border-radius: 10px; transition: width .6s ease; }

  .r-insight {
    margin-top: 14px; padding-top: 14px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    margin: 14px -20px -16px;
    padding: 12px 20px;
    font-size: 11px; color: var(--muted);
    display: flex; align-items: flex-start; gap: 6px;
  }

  .bottom-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .summary-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1px; background: var(--border);
  }
  .summary-cell { background: var(--surface); padding: 18px 20px; }
  .sc-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 5px; }
  .sc-value { font-size: 22px; font-weight: 700; }

  .vip-item {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 20px;
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  .vip-item:last-child { border-bottom: none; }
  .vip-item:hover { background: #fffbeb; }

  .vip-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }

  .vip-info { flex: 1; }
  .vip-label  { font-size: 12px; color: var(--muted); }
  .vip-amount { font-size: 15px; font-weight: 700; color: var(--amber); }
  .vip-time   { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .vip-tag {
    background: var(--amber-soft); color: #92400e;
    font-size: 9px; font-weight: 700;
    padding: 2px 7px; border-radius: 20px;
  }

  .vip-contact-btn {
    background: none; border: 1.5px solid var(--amber);
    color: var(--amber); padding: 5px 12px;
    border-radius: 7px; font-size: 11px;
    font-weight: 600; cursor: pointer;
    font-family: inherit; white-space: nowrap;
    transition: all .12s;
    text-decoration: none;
    display: inline-block;
  }
  .vip-contact-btn:hover { background: var(--amber); color: #fff; }

  .vip-empty {
    padding: 28px 20px; text-align: center;
    color: var(--muted); font-size: 12px;
  }

  .quick-links { padding: 14px 20px; display: flex; flex-direction: column; gap: 8px; }
  .ql-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 9px;
    background: var(--bg); cursor: pointer;
    transition: background .12s;
    border: 1px solid transparent;
    text-decoration: none;
    color: inherit;
  }
  .ql-item:hover { background: var(--green-soft); border-color: #86efac; }
  .ql-icon { font-size: 16px; }
  .ql-label { font-size: 12px; font-weight: 500; }
  .ql-arrow { margin-right: auto; font-size: 11px; color: var(--muted); }

  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }

  @media (max-width: 1100px) {
    .body-grid { grid-template-columns: 1fr; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .bottom-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 720px) {
    .sidebar { display: none; }
    .main { margin-right: 0; }
    .kpi-grid { grid-template-columns: 1fr; }
  }
  .hidden { display: none !important; }

  .ref-msg { margin-bottom: 12px; border-radius: 10px; padding: 10px 14px; font-size: 13px; }
  .ref-msg--err { border: 1px solid #fecaca; background: #fef2f2; color: #991b1b; }
  .ref-msg--ok { border: 1px solid #bbf7d0; background: #ecfdf5; color: #166534; font-weight: 600; }
  .ref-seg { display: inline-flex; border-radius: 9px; border: 1px solid var(--border); overflow: hidden; background: #fff; width: 100%; max-width: 22rem; }
  .ref-seg a { flex: 1; text-align: center; display: inline-block; padding: 7px 14px; font-size: 11px; font-weight: 700; text-decoration: none; color: var(--muted); }
  .ref-seg a.on { background: var(--green-soft); color: var(--green); }
  .ref-onboarding { margin-bottom: 20px; padding: 16px 18px; border-radius: 13px; border: 1px solid var(--border); background: var(--surface); box-shadow: var(--shadow); font-size: 13px; }
</style>
