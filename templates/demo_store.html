<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo store — CartFlow</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 16px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #f4f4f5;
      color: #18181b;
      padding: 1.5rem;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    h1 { font-size: 1.25rem; margin: 0 0 0.25rem 0; }
    .sub { color: #71717a; font-size: 0.875rem; margin-bottom: 1.5rem; }
    .grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .card h2 { font-size: 1rem; margin: 0 0 0.5rem 0; }
    .price { font-weight: 600; color: #3f3f46; margin-bottom: 0.75rem; }
    button {
      width: 100%;
      cursor: pointer;
      border: 0;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font: inherit;
      font-weight: 600;
      background: #7c3aed;
      color: #fff;
    }
    button:hover { filter: brightness(1.05); }
    .note {
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: #71717a;
    }
  </style>
</head>
<body>
  {% include "partials/cart_abandon_tracking.html" %}
  <script>
    window.cart = window.cart || [];

    function addToCart(product) {
      window.cart = window.cart || [];
      window.cart.push(product);
      console.log("cart state:", window.cart);
    }
  </script>

  <h1>Demo store</h1>
  <p class="sub">Internal only — global <code>window.cart</code> only; check console.</p>

  <div class="grid">
    <div class="card">
      <h2>Sample Hoodie</h2>
      <div class="price">99.00 SAR</div>
      <button type="button" onclick="addToCart({ name: 'Sample Hoodie', price: 99 })">Add to cart</button>
    </div>
    <div class="card">
      <h2>Sample Mug</h2>
      <div class="price">29.00 SAR</div>
      <button type="button" onclick="addToCart({ name: 'Sample Mug', price: 29 })">Add to cart</button>
    </div>
    <div class="card">
      <h2>Sample Notebook</h2>
      <div class="price">19.00 SAR</div>
      <button type="button" onclick="addToCart({ name: 'Sample Notebook', price: 19 })">Add to cart</button>
    </div>
  </div>

  <p class="note">Cart is <code>window.cart</code> only — not driven by the list above.</p>

  <script src="/static/widget_loader.js" data-store="demo"></script>
</body>
</html>
