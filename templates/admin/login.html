{% extends "admin/base.html" %}
{% block title %}Login{% endblock %}
{% block body %}
<div class="mx-auto flex min-h-screen max-w-md flex-col justify-center px-4">
  <div class="rounded-2xl border border-slate-200 bg-white p-8 shadow-sm">
    <h1 class="text-xl font-bold text-slate-900">Admin login</h1>
    <p class="mt-1 text-sm text-slate-600">Sign in to access the admin dashboard.</p>
    {% if error %}
    <p class="mt-4 rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-800" role="alert">{{ error }}</p>
    {% endif %}
    <form method="post" action="/admin/login" class="mt-6 space-y-4">
      <div>
        <label for="username" class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Username or email</label>
        <input id="username" name="username" type="text" autocomplete="username" required
          class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
      </div>
      <div>
        <label for="password" class="block text-xs font-semibold uppercase tracking-wide text-slate-500">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required
          class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
      </div>
      <button type="submit"
        class="w-full rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white shadow hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
        Sign in
      </button>
    </form>
  </div>
  <p class="mt-6 text-center text-xs text-slate-400">Merchant dashboard remains at <a class="text-indigo-600 hover:underline" href="/dashboard">/dashboard</a></p>
</div>
{% endblock %}
