<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recovery settings — CartFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            zid: { 500: "#7c3aed", 600: "#5b2d8b", 100: "#ede9fe" },
          },
        },
      },
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>body { font-family: "Inter", system-ui, sans-serif; }</style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 p-6">
  {% include "partials/cart_abandon_tracking.html" %}
  <div class="max-w-md mx-auto">
    <a href="/dashboard" class="text-sm text-zid-600 hover:underline mb-6 inline-block">← Back to dashboard</a>
    <h1 class="text-xl font-semibold text-slate-900 mb-1">Recovery settings</h1>
    <p class="text-sm text-slate-500 mb-6">How long to wait before recovery messages, and how many to send.</p>

    <div id="errBox" class="hidden mb-4 rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-800"></div>
    <div id="okBox" class="hidden mb-4 rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-800">Saved.</div>

    <form id="f" class="space-y-4 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
      <div>
        <label class="block text-sm font-medium text-slate-700" for="recovery_delay">Delay (number)</label>
        <input id="recovery_delay" name="recovery_delay" type="number" min="1" step="1"
          class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm focus:border-zid-500 focus:outline-none focus:ring-1 focus:ring-zid-500" required />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700" for="recovery_delay_unit">Unit</label>
        <select id="recovery_delay_unit" name="recovery_delay_unit"
          class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm focus:border-zid-500 focus:outline-none focus:ring-1 focus:ring-zid-500">
          <option value="minutes">minutes</option>
          <option value="hours">hours</option>
          <option value="days">days</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700" for="recovery_attempts">Recovery attempts</label>
        <input id="recovery_attempts" name="recovery_attempts" type="number" min="1" step="1"
          class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm focus:border-zid-500 focus:outline-none focus:ring-1 focus:ring-zid-500" required />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700" for="whatsapp_support_url">WhatsApp support link (optional)</label>
        <input id="whatsapp_support_url" name="whatsapp_support_url" type="url" inputmode="url" autocomplete="off" placeholder="https://wa.me/9665..."
          class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm focus:border-zid-500 focus:outline-none focus:ring-1 focus:ring-zid-500" />
        <p class="mt-1 text-xs text-slate-500">Used when customers choose to contact you from the cart widget.</p>
      </div>
      <button type="submit" id="saveBtn"
        class="w-full rounded-lg bg-zid-600 py-2.5 text-sm font-medium text-white hover:bg-zid-500 focus:outline-none focus:ring-2 focus:ring-zid-500 focus:ring-offset-1">
        Save
      </button>
    </form>
  </div>
  <script>
    (function () {
      var errBox = document.getElementById("errBox");
      var okBox = document.getElementById("okBox");
      function showErr(t) { errBox.textContent = t || "Error"; errBox.classList.remove("hidden"); okBox.classList.add("hidden"); }
      function showOk() { okBox.classList.remove("hidden"); errBox.classList.add("hidden"); }
      function hideMsg() { errBox.classList.add("hidden"); okBox.classList.add("hidden"); }

      fetch("/api/recovery-settings")
        .then(function (r) { return r.json().then(function (d) { return { status: r.status, data: d }; }); })
        .then(function (x) {
          if (x.data.ok) {
            document.getElementById("recovery_delay").value = x.data.recovery_delay;
            document.getElementById("recovery_delay_unit").value = x.data.recovery_delay_unit;
            document.getElementById("recovery_attempts").value = x.data.recovery_attempts;
            if (x.data.whatsapp_support_url) {
              document.getElementById("whatsapp_support_url").value = x.data.whatsapp_support_url;
            }
            hideMsg();
          } else {
            showErr(x.data.error || "Failed to load settings (e.g. no store yet).");
          }
        })
        .catch(function () { showErr("Network error loading settings."); });

      document.getElementById("f").addEventListener("submit", function (e) {
        e.preventDefault();
        hideMsg();
        var body = {
          recovery_delay: parseInt(document.getElementById("recovery_delay").value, 10),
          recovery_delay_unit: document.getElementById("recovery_delay_unit").value,
          recovery_attempts: parseInt(document.getElementById("recovery_attempts").value, 10),
          whatsapp_support_url: (document.getElementById("whatsapp_support_url") && document.getElementById("whatsapp_support_url").value) || "",
        };
        fetch("/api/recovery-settings", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) })
          .then(function (r) { return r.json().then(function (d) { return { status: r.status, data: d }; }); })
          .then(function (x) {
            if (x.data.ok) {
              showOk();
            } else {
              showErr(x.data.error || "Save failed");
            }
          })
          .catch(function () { showErr("Network error while saving."); });
      });
    })();
  </script>
</body>
</html>
