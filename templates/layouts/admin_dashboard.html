<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block admin_title %}CartFlow Admin{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: "IBM Plex Sans Arabic", ui-sans-serif, system-ui, sans-serif; }
    #admin-sidebar-panel { transform: translateX(-100%); }
    #admin-sidebar-panel.admin-sidebar-open { transform: translateX(0); }
    @media (min-width: 1024px) {
      #admin-sidebar-panel { transform: none; }
    }
    .admin-nav-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-radius: 0.625rem;
      padding: 0.5625rem 0.75rem;
      font-size: 0.875rem;
      font-weight: 500;
      line-height: 1.35;
      color: rgb(71 85 105);
      transition: background-color 0.15s, color 0.15s, box-shadow 0.15s;
    }
    .admin-nav-link:hover {
      background-color: rgb(255 255 255);
      color: rgb(15 23 42);
    }
    .admin-nav-link.admin-nav-active {
      background: linear-gradient(135deg, rgb(79 70 229) 0%, rgb(67 56 202) 100%);
      color: rgb(255 255 255);
      font-weight: 600;
      box-shadow: 0 4px 14px rgba(79, 70, 229, 0.28);
    }
    .admin-nav-link--stacked {
      flex-direction: column;
      align-items: flex-start;
      gap: 0.125rem;
    }
    .admin-nav-link-title {
      font-weight: 600;
      line-height: 1.3;
    }
    .admin-nav-link-sub {
      font-size: 0.6875rem;
      font-weight: 400;
      line-height: 1.35;
      color: rgb(100 116 139);
    }
    .admin-nav-link.admin-nav-active .admin-nav-link-sub {
      color: rgb(224 231 255);
      opacity: 0.95;
    }
    .admin-mobile-verdict {
      box-shadow: 0 -4px 24px rgb(15 23 42 / 0.08);
    }
    .admin-mobile-verdict--ok { background: rgb(236 253 245); border-color: rgb(167 243 208); }
    .admin-mobile-verdict--watch { background: rgb(255 251 235); border-color: rgb(253 230 138); }
    .admin-mobile-verdict--action { background: rgb(255 241 242); border-color: rgb(254 202 202); }
    .admin-nav-group {
      margin-bottom: 0.75rem;
      border-radius: 0.875rem;
      background: rgb(255 255 255 / 0.55);
      padding: 0.375rem;
      border: 1px solid rgb(226 232 240 / 0.8);
    }
    .admin-nav-group-title {
      padding: 0.375rem 0.625rem 0.25rem;
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgb(100 116 139);
    }
    .admin-level-tag {
      display: inline-flex;
      align-items: center;
      border-radius: 9999px;
      padding: 0.25rem 0.75rem;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      background: rgb(241 245 249);
      color: rgb(100 116 139);
    }
    .admin-card {
      border-radius: 1rem;
      border: 1px solid rgb(226 232 240 / 0.9);
      background: rgb(255 255 255);
      box-shadow: 0 1px 2px rgb(15 23 42 / 0.04);
    }
    .admin-hero {
      border-radius: 1.25rem;
      border: 1px solid transparent;
      padding: 2rem 2.25rem;
      box-shadow: 0 8px 30px rgb(15 23 42 / 0.06);
    }
    .admin-hero--ok {
      background: linear-gradient(145deg, rgb(236 253 245) 0%, rgb(255 255 255) 55%);
      border-color: rgb(167 243 208 / 0.9);
    }
    .admin-hero--watch {
      background: linear-gradient(145deg, rgb(255 251 235) 0%, rgb(255 255 255) 55%);
      border-color: rgb(253 230 138 / 0.95);
    }
    .admin-hero--action {
      background: linear-gradient(145deg, rgb(255 241 242) 0%, rgb(255 255 255) 55%);
      border-color: rgb(254 202 202 / 0.95);
    }
    .admin-hero-metric {
      border-radius: 0.875rem;
      border: 1px solid rgb(226 232 240 / 0.75);
      background: rgb(255 255 255 / 0.85);
      padding: 1.125rem 1.25rem;
    }
    .admin-hero-metric-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: rgb(100 116 139);
      margin-bottom: 0.5rem;
    }
    .admin-hero-metric-value {
      display: block;
      font-size: 1.0625rem;
      font-weight: 600;
      line-height: 1.45;
      color: rgb(15 23 42);
    }
  </style>
</head>
<body class="min-h-screen bg-[#f6f7fb] text-slate-800 antialiased">
  <div class="min-h-screen" dir="ltr">
    {% include "partials/admin_sidebar.html" %}

    <div id="admin-sidebar-backdrop"
         class="fixed inset-0 z-30 bg-slate-900/40 opacity-0 pointer-events-none transition-opacity duration-200 lg:hidden"
         aria-hidden="true"></div>

    <div class="flex min-h-screen min-w-0 flex-col lg:pl-[17.5rem]" dir="rtl">
      <header class="sticky top-0 z-20 border-b border-slate-200/60 bg-white/90 backdrop-blur-md">
        <div class="flex items-center justify-between gap-4 px-6 py-4 lg:px-10">
          <div class="flex min-w-0 flex-1 items-center gap-3">
            <button type="button"
                    id="admin-sidebar-toggle"
                    class="rounded-xl border border-slate-200/80 bg-white p-2.5 text-slate-600 shadow-sm hover:bg-slate-50 lg:hidden"
                    aria-controls="admin-sidebar-panel"
                    aria-expanded="false"
                    aria-label="فتح القائمة">
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
              </svg>
            </button>
            <div class="min-w-0">
              {% block admin_page_header %}
              <h1 class="truncate text-xl font-semibold tracking-tight text-slate-900">{{ admin_page_title_ar | default("لوحة الإدارة") }}</h1>
              {% if admin_page_subtitle_ar %}
              <p class="mt-1 truncate text-sm text-slate-500">{{ admin_page_subtitle_ar }}</p>
              {% endif %}
              {% endblock %}
            </div>
          </div>
          <form method="post" action="/admin/operations/logout" class="shrink-0">
            <button type="submit" class="rounded-xl border border-slate-200/80 bg-white px-4 py-2 text-sm font-medium text-slate-600 shadow-sm transition hover:border-slate-300 hover:bg-slate-50">خروج</button>
          </form>
        </div>
      </header>

      <main class="flex-1 {% block admin_main_class %}w-full space-y-8 px-6 py-8 lg:px-10 lg:py-10{% endblock %}">
        {% block admin_content %}{% endblock %}
      </main>
    </div>
  </div>
  <script>
    (function () {
      var panel = document.getElementById("admin-sidebar-panel");
      var backdrop = document.getElementById("admin-sidebar-backdrop");
      var toggle = document.getElementById("admin-sidebar-toggle");
      if (!panel || !toggle) return;
      function setOpen(open) {
        panel.classList.toggle("admin-sidebar-open", open);
        if (backdrop) {
          backdrop.classList.toggle("admin-sidebar-open", open);
          backdrop.classList.toggle("opacity-100", open);
          backdrop.classList.toggle("pointer-events-auto", open);
        }
        toggle.setAttribute("aria-expanded", open ? "true" : "false");
      }
      toggle.addEventListener("click", function () {
        setOpen(!panel.classList.contains("admin-sidebar-open"));
      });
      if (backdrop) backdrop.addEventListener("click", function () { setOpen(false); });
      panel.querySelectorAll("a").forEach(function (a) {
        a.addEventListener("click", function () {
          if (window.matchMedia("(max-width: 1023px)").matches) setOpen(false);
        });
      });
    })();
  </script>
</body>
</html>
