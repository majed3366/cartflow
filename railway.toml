# Railway config-as-code: root repo, Dockerfile build, FastAPI entry main:app
# Deploy root directory must be the repository root (not a subdirectory).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Same as python -m uvicorn main:app … — PORT من البيئة (Railway)، الافتراضي 8000 محلياً
startCommand = "python start.py"
