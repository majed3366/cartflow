# Railway config-as-code: root repo, Dockerfile build, FastAPI entry main:app
# Deploy root directory must be the repository root (not a subdirectory).
#
# PRODUCTION: use TWO Railway services — see docs/railway_api_scheduler_deployment_v1.md
#
# Service A (API):     CARTFLOW_PROCESS_ROLE=api
#                      CARTFLOW_DB_DUE_SCANNER_ENABLED=false
#                      CARTFLOW_RECOVERY_RESUME_ON_STARTUP=0
#
# Service B (Scheduler): CARTFLOW_PROCESS_ROLE=scheduler
#                        CARTFLOW_DB_DUE_SCANNER_ENABLED=true
#                        CARTFLOW_RECOVERY_RESUME_ON_STARTUP=1
#                        (single replica only)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -m uvicorn main:app --host 0.0.0.0 --port 8000"

# smart-reply-ai (public API) — scheduler drivers MUST stay off on this service.
# Scheduler service: set role=scheduler + scanner/resume in Railway dashboard only.
[env]
CARTFLOW_PROCESS_ROLE = "api"
CARTFLOW_RECOVERY_RESUME_ON_STARTUP = "0"
CARTFLOW_DB_DUE_SCANNER_ENABLED = "false"
CARTFLOW_ENFORCE_API_ONLY = "1"
# Pre-launch production validation: Workspace primary.
# Prefer explicit true; Railway deploy also enables when unset (see feature_flag_v1).
# Rollback = set false / 0 / off + redeploy/restart.
CARTFLOW_CART_WORKSPACE_V1 = "true"
